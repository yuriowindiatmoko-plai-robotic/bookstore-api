services:
  postgres:
    image: postgres:16
    container_name: bookstore-postgres
    restart: always
    environment:
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore_secret
      POSTGRES_DB: bookstore_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore -d bookstore_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
